name: Deploy to Staging

on:
  push:
    branches: [staging]

# Requires repo secrets: STAGING_HOST, STAGING_USER, STAGING_SSH_KEY,
# STAGING_DEPLOY_PATH. Fill these in under
# Settings > Environments > staging before this workflow can deploy.
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            git fetch origin staging
            git reset --hard origin/staging
            cd backend && source venv/bin/activate
            pip install -r requirements/prod.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart fjadmin-backend
            cd ../frontend && npm ci && npm run build
            sudo systemctl reload nginx
